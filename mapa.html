<!DOCTYPE html>
<html>
<head>
  <title>Zythera: Nightmare Kingdom</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #map {
      height: 80vh;
      width: 100%;
    }

    footer {
      padding: 15px;
      background: #111;
    }
  </style>
</head>

<body>

<h2>🌲 Zythera: Nightmare Kingdom</h2>

<div id="map"></div>


<script>

// 🗺️ 1. Crear mapa (centrado en zona bosque)
var map = L.map('map').setView([50.7, 10.0], 5);

// 🌑 2. Fondo oscuro
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// 📍 3. PUNTOS DE ZYTHERA

L.marker([50.7, 10.2]).addTo(map)
  .bindPopup("🏚️ Entrada a Zythera<br>Prohibido entrar de noche");

L.marker([51.2, 9.5]).addTo(map)
  .bindPopup("🌲 Bosque de Sombras<br>Se escuchan susurros");

L.marker([50.1, 10.8]).addTo(map)
  .bindPopup("🚫 Zona Prohibida<br>Nadie regresa");

L.marker([51.0, 10.9]).addTo(map)
  .bindPopup("👁️ Lago de los Susurros");

L.marker([50.4, 9.3]).addTo(map)
  .bindPopup("🕯️ Ruinas Olvidadas");

// 🧭 4. RUTA PRINCIPAL

L.polyline([
  [50.7, 10.2],
  [51.0, 10.0],
  [50.8, 9.6],
  [50.4, 9.3]
]).addTo(map).bindPopup("Ruta principal");

// 🧭 CAMINO PROHIBIDO

L.polyline([
  [50.7, 10.2],
  [50.9, 10.5],
  [51.2, 10.8]
]).addTo(map).bindPopup("Camino prohibido");

</script>

</body>
</html>
